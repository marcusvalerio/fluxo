<!DOCTYPE html>
<html lang="pt-BR" class="">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FLUXO</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      fontFamily: { sans: ['Inter','sans-serif'] },
      colors: {
        brand: {
          50:  '#f0fdf6', 100: '#dcfce9', 200: '#bbf7d2',
          300: '#86efad', 400: '#4ade80', 500: '#22c55e',
          600: '#16a34a', 700: '#15803d', 800: '#166534', 900: '#14532d',
        },
        ink: {
          50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0',
          300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b',
          600: '#475569', 700: '#334155', 800: '#1e293b',
          900: '#0f172a', 950: '#020617',
        }
      },
      backdropBlur: { '4xl': '72px' },
      animation: {
        'float-slow': 'floatSlow 8s ease-in-out infinite',
        'float-mid':  'floatMid  6s ease-in-out infinite 1s',
        'float-fast': 'floatFast 5s ease-in-out infinite 2s',
        'shimmer':    'shimmer   2s linear infinite',
        'pulse-ring': 'pulseRing 2.5s ease-out infinite',
        'pin-shake':  'pinShake  .4s cubic-bezier(.36,.07,.19,.97)',
        'slide-up':   'slideUp   .38s cubic-bezier(.16,1,.3,1)',
        'fade-in':    'fadeIn    .32s ease',
        'scale-in':   'scaleIn   .4s cubic-bezier(.34,1.56,.64,1)',
        'logo-enter': 'logoEnter .9s cubic-bezier(.16,1,.3,1)',
        'logo-exit':  'logoExit  .6s cubic-bezier(.4,0,.2,1) forwards',
        'tick':       'tick      .22s cubic-bezier(.34,1.56,.64,1)',
      },
      keyframes: {
        floatSlow:  { '0%,100%': {transform:'translateY(0) scale(1)'},    '50%': {transform:'translateY(-28px) scale(1.04)'} },
        floatMid:   { '0%,100%': {transform:'translateY(0) scale(1)'},    '50%': {transform:'translateY(-18px) scale(.97)'} },
        floatFast:  { '0%,100%': {transform:'translateY(0) rotate(0deg)'},'50%': {transform:'translateY(-12px) rotate(8deg)'} },
        shimmer:    { '0%': {backgroundPosition:'200% 0'}, '100%': {backgroundPosition:'-200% 0'} },
        pulseRing:  { '0%': {transform:'scale(1)',opacity:.4}, '100%': {transform:'scale(1.7)',opacity:0} },
        pinShake:   { '0%,100%': {transform:'translateX(0)'}, '20%': {transform:'translateX(-8px)'}, '40%': {transform:'translateX(8px)'}, '60%': {transform:'translateX(-5px)'}, '80%': {transform:'translateX(5px)'} },
        slideUp:    { from:{opacity:0,transform:'translateY(24px)'}, to:{opacity:1,transform:'translateY(0)'} },
        fadeIn:     { from:{opacity:0}, to:{opacity:1} },
        scaleIn:    { from:{opacity:0,transform:'scale(.85)'}, to:{opacity:1,transform:'scale(1)'} },
        logoEnter:  { from:{opacity:0,transform:'scale(.7)'}, to:{opacity:1,transform:'scale(1)'} },
        logoExit:   { from:{opacity:1,transform:'scale(1)'}, to:{opacity:0,transform:'scale(.5)'} },
        tick:       { from:{transform:'scale(.7)'}, to:{transform:'scale(1)'} },
      }
    }
  }
}
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; }
  body { background: #f8fafc; color: #0f172a; transition: background .4s, color .4s; }

  /* ── DARK MODE ── */
  .dark body, body.dark { background: #020617; color: #f8fafc; }

  /* ── MESH GRADIENTS ── */
  .mesh-light {
    background:
      radial-gradient(ellipse 80% 60% at 20% -10%, rgba(34,197,94,.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 110%, rgba(99,102,241,.07) 0%, transparent 55%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(20,184,166,.04) 0%, transparent 60%),
      #f8fafc;
  }
  .dark .mesh-dark {
    background:
      radial-gradient(ellipse 80% 60% at 10% 0%, rgba(16,185,129,.18) 0%, transparent 55%),
      radial-gradient(ellipse 60% 50% at 90% 100%, rgba(79,70,229,.25) 0%, transparent 55%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(6,182,212,.10) 0%, transparent 60%),
      #020617;
  }

  /* ── GLASS ── */
  .glass-light {
    background: rgba(255,255,255,.72);
    backdrop-filter: blur(48px) saturate(180%);
    -webkit-backdrop-filter: blur(48px) saturate(180%);
    border: 1px solid rgba(255,255,255,.6);
  }
  .dark .glass-dark {
    background: rgba(15,23,42,.55);
    backdrop-filter: blur(48px) saturate(180%);
    -webkit-backdrop-filter: blur(48px) saturate(180%);
    border: 1px solid rgba(255,255,255,.07);
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 0; }

  /* ── APP SHELL ── */
  #app { height: 100svh; max-width: 430px; margin: 0 auto; position: relative; overflow: hidden; display: flex; flex-direction: column; }

  /* ── SCREENS ── */
  .screen { position: absolute; inset: 0; display: flex; flex-direction: column; overflow: hidden; opacity: 0; pointer-events: none; transition: opacity .35s ease; }
  .screen.active { opacity: 1; pointer-events: all; }

    /* ── NUMPAD BTN ATUALIZADO ── */
  .npbtn { 
    display: flex; align-items: center; justify-content: center; height: 68px; border-radius: 50%; 
    font-size: 1.5rem; font-weight: 300; cursor: pointer; 
    transition: transform .15s cubic-bezier(.34,1.56,.64,1), background .15s; 
    user-select: none; 
    /* Força cor escura para garantir leitura no fundo claro atual */
    color: #1e293b !important; 
  }
  
  /* Se estiver no modo dark, inverte a cor */
  .dark .npbtn { color: #f8fafc !important; }
  
  .npbtn:active { transform: scale(.88); }


  /* ── PIN DOT ── */
  .pin-dot { width: 13px; height: 13px; border-radius: 50%; border: 1.5px solid currentColor; transition: all .2s cubic-bezier(.34,1.56,.64,1); }
  .pin-dot.filled { transform: scale(1); }

  /* ── CHIP ── */
  .chip-btn { flex: 1; padding: 1rem; border-radius: 18px; font-size: .82rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; transition: all .22s cubic-bezier(.34,1.56,.64,1); cursor: pointer; border: none; }

  /* ── FAB ── */
  .fab { position: relative; display: flex; align-items: center; justify-content: center; }
  .fab::before { content:''; position:absolute; inset:0; border-radius:50%; background:rgba(34,197,94,.35); animation: pulseRing 2.5s ease-out infinite; }

  /* ── TX ITEM ── */
  .tx-item { transition: transform .18s cubic-bezier(.34,1.56,.64,1); }
  .tx-item:active { transform: scale(.975); }

  /* ── CALC DISPLAY ── */
  #calc-display { font-variant-numeric: tabular-nums; letter-spacing: -.02em; }

  /* ── SHIMMER CARD ── */
  .shimmer-bg {
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.12) 40%, transparent 100%);
    background-size: 200% 100%;
    animation: shimmer 2s linear infinite;
  }

  /* ── SAFE AREA ── */
  .safe-top    { padding-top: max(env(safe-area-inset-top, 20px), 20px); }
  .safe-bottom { padding-bottom: max(env(safe-area-inset-bottom, 16px), 16px); }

  /* theme toggle */
  #theme-toggle { transition: transform .3s cubic-bezier(.34,1.56,.64,1); }
  #theme-toggle:active { transform: scale(.8) rotate(30deg); }
</style>
</head>

<body class="mesh-light dark:mesh-dark">

<!-- ████████████████████████████████████████
     SPLASH
████████████████████████████████████████ -->
<div id="screen-splash" class="screen active" style="z-index:100; background: transparent;">
  <div class="flex-1 flex flex-col items-center justify-center gap-6">

    <!-- FLUXO LOGO SVG -->
    <div id="splash-logo" style="animation: logoEnter .9s cubic-bezier(.16,1,.3,1)">
      <svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lg1" x1="0" y1="0" x2="96" y2="96" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#22c55e"/>
            <stop offset="50%" stop-color="#06b6d4"/>
            <stop offset="100%" stop-color="#6366f1"/>
          </linearGradient>
          <linearGradient id="lg2" x1="96" y1="0" x2="0" y2="96" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#22c55e" stop-opacity=".3"/>
            <stop offset="100%" stop-color="#6366f1" stop-opacity=".1"/>
          </linearGradient>
          <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feComposite in="SourceGraphic" in2="blur" operator="over"/></filter>
        </defs>
        <!-- outer ring -->
        <circle cx="48" cy="48" r="45" stroke="url(#lg1)" stroke-width="1.5" stroke-dasharray="6 4" opacity=".4"/>
        <!-- bg circle -->
        <circle cx="48" cy="48" r="38" fill="url(#lg2)"/>
        <circle cx="48" cy="48" r="38" stroke="url(#lg1)" stroke-width="1.2" opacity=".3"/>
        <!-- flow wave symbol -->
        <path d="M22 54 C28 38, 36 38, 42 48 C48 58, 56 58, 62 42 C68 26, 74 38, 74 42" stroke="url(#lg1)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
        <!-- arrow up (entrada) -->
        <path d="M62 34 L68 28 L74 34" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <!-- circle node -->
        <circle cx="48" cy="48" r="4" fill="url(#lg1)" opacity=".9"/>
        <!-- dot nodes -->
        <circle cx="22" cy="54" r="2.5" fill="#22c55e" opacity=".8"/>
        <circle cx="74" cy="42" r="2.5" fill="#6366f1" opacity=".8"/>
      </svg>
    </div>

    <!-- wordmark -->
    <div id="splash-wordmark" style="animation: fadeIn .6s ease .3s both">
      <div class="text-4xl font-black tracking-[-0.06em] dark:text-white text-ink-900">
        FLU<span class="text-brand-500">XO</span>
      </div>
      <div class="text-center text-xs font-medium tracking-widest uppercase text-ink-400 dark:text-ink-500 mt-1">
        Gestão Financeira
      </div>
    </div>

  </div>
  <!-- loader bar -->
  <div class="safe-bottom pb-12 flex justify-center">
    <div class="w-32 h-px bg-ink-200 dark:bg-ink-800 rounded-full overflow-hidden">
      <div id="splash-bar" class="h-full bg-brand-500 rounded-full" style="width:0%; transition: width 1.3s cubic-bezier(.4,0,.2,1)"></div>
    </div>
  </div>
</div>

<!-- ████████████████████████████████████████
     PIN LOCK
████████████████████████████████████████ -->
<div id="screen-pin" class="screen" style="z-index:90">
  <!-- bg -->
  <div class="absolute inset-0 mesh-light dark:mesh-dark"></div>

  <div class="relative flex-1 flex flex-col safe-top">
    <!-- header -->
    <div class="flex items-center justify-between px-6 py-4">
      <div class="flex items-center gap-2.5">
        <svg width="22" height="22" viewBox="0 0 96 96" fill="none"><path d="M22 54 C28 38,36 38,42 48 C48 58,56 58,62 42 C68 26,74 38,74 42" stroke="#22c55e" stroke-width="5" stroke-linecap="round" fill="none"/><circle cx="48" cy="48" r="5" fill="#22c55e"/></svg>
        <span class="font-black text-base tracking-[-0.04em] dark:text-white text-ink-900">FLU<span class="text-brand-500">XO</span></span>
      </div>
      <button id="theme-toggle" onclick="toggleTheme()" class="w-9 h-9 rounded-full flex items-center justify-center glass-light dark:glass-dark">
        <svg id="icon-sun" class="dark:hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0f172a" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg id="icon-moon" class="hidden dark:block" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f8fafc" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>

    <!-- center -->
    <div class="flex-1 flex flex-col items-center justify-center px-8 gap-10">
      <div class="text-center">
        <div id="pin-title" class="text-2xl font-light dark:text-white text-ink-900 mb-1.5">Bem-vindo</div>
        <div id="pin-subtitle" class="text-sm text-ink-400 dark:text-ink-500 font-medium"></div>
      </div>

      <!-- PIN dots -->
      <div id="pin-dots" class="flex gap-4">
        <div class="pin-dot text-ink-300 dark:text-ink-600"></div>
        <div class="pin-dot text-ink-300 dark:text-ink-600"></div>
        <div class="pin-dot text-ink-300 dark:text-ink-600"></div>
        <div class="pin-dot text-ink-300 dark:text-ink-600"></div>
      </div>

      <!-- error msg -->
      <div id="pin-error" class="text-sm text-red-400 font-medium h-4 opacity-0 transition-opacity duration-200"></div>
    </div>

    <!-- numpad -->
    <div class="safe-bottom px-6 pb-8">
      <div class="grid grid-cols-3 gap-3">
        <!-- 1-9 -->
        <script>
          const nums = [1,2,3,4,5,6,7,8,9];
          nums.forEach(n => {
            document.write(`<button class="npbtn glass-light dark:glass-dark dark:text-white text-ink-900 font-light" onclick="pinInput(${n})">${n}</button>`);
          });
        </script>
        <!-- bio / empty / 0 / del -->
        <div class="npbtn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" class="text-ink-400 dark:text-ink-500"><path d="M12 2C8.13 2 5 5.13 5 9v3H3v10h18V12h-2V9c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="16" r="1.5"/></svg>
        </div>
        <button class="npbtn glass-light dark:glass-dark dark:text-white text-ink-900 font-light" onclick="pinInput(0)">0</button>
        <button class="npbtn" onclick="pinDel()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="text-ink-500 dark:text-ink-400"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
        </button>
      </div>
      <button id="pin-reset-btn" onclick="resetPin()" class="mt-4 w-full text-xs text-ink-400 dark:text-ink-600 font-medium py-2 tracking-wide hidden">Esqueci meu PIN</button>
    </div>
  </div>
</div>

<!-- ████████████████████████████████████████
     DASHBOARD
████████████████████████████████████████ -->
<div id="screen-dash" class="screen" style="z-index:80">
  <div class="absolute inset-0 mesh-light dark:mesh-dark"></div>

  <div class="relative flex-1 flex flex-col overflow-hidden">
    <!-- topbar -->
    <div class="safe-top px-6 pt-4 pb-2 flex items-center justify-between">
      <div>
        <div class="text-xs font-semibold tracking-widest uppercase text-ink-400 dark:text-ink-500 mb-0.5">Olá, <span id="dash-user" class="text-brand-500"></span></div>
        <div class="flex items-center gap-2">
          <svg width="18" height="18" viewBox="0 0 96 96" fill="none"><path d="M22 54 C28 38,36 38,42 48 C48 58,56 58,62 42 C68 26,74 38,74 42" stroke="#22c55e" stroke-width="5" stroke-linecap="round" fill="none"/><circle cx="48" cy="48" r="5" fill="#22c55e"/></svg>
          <span class="font-black text-sm tracking-[-0.04em] dark:text-white text-ink-900">FLUXO</span>
        </div>
      </div>
      <div class="flex gap-2">
        <button onclick="toggleTheme()" class="w-9 h-9 rounded-full flex items-center justify-center glass-light dark:glass-dark">
          <svg class="dark:hidden" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0f172a" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/></svg>
          <svg class="hidden dark:block" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#f8fafc" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button onclick="lockApp()" class="w-9 h-9 rounded-full flex items-center justify-center glass-light dark:glass-dark">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="text-ink-500 dark:text-ink-400"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </button>
      </div>
    </div>

    <!-- scrollable content -->
    <div class="flex-1 overflow-y-auto px-5 pb-32 pt-2" style="-webkit-overflow-scrolling:touch">

      <!-- hero saldo card -->
      <div id="hero-card" class="rounded-3xl p-6 mb-4 relative overflow-hidden" style="animation: scaleIn .4s cubic-bezier(.34,1.56,.64,1)">
        <!-- glass base -->
        <div class="absolute inset-0 glass-light dark:glass-dark rounded-3xl"></div>
        <!-- glow -->
        <div id="hero-glow" class="absolute inset-0 rounded-3xl opacity-0 transition-opacity duration-700" style="background: radial-gradient(ellipse 70% 60% at 30% 40%, rgba(34,197,94,.18) 0%, transparent 65%)"></div>
        <!-- shimmer stripe -->
        <div class="absolute inset-0 rounded-3xl shimmer-bg opacity-30 pointer-events-none"></div>

        <div class="relative">
          <div class="text-xs font-semibold tracking-widest uppercase text-ink-400 dark:text-ink-500 mb-4">Saldo Atual</div>
          <div id="dash-saldo" class="text-5xl font-light tracking-tight dark:text-white text-ink-900 mb-1 transition-all duration-500">R$ 0,00</div>
          <div id="dash-saldo-badge" class="inline-flex items-center gap-1.5 text-xs font-semibold px-2.5 py-1 rounded-full mt-2 opacity-0 transition-opacity duration-300">
            <div class="w-1.5 h-1.5 rounded-full bg-current"></div>
            <span id="dash-badge-txt"></span>
          </div>
        </div>
      </div>

      <!-- receitas / despesas -->
      <div class="grid grid-cols-2 gap-3 mb-4">
        <!-- receitas -->
        <div class="rounded-2xl p-4 relative overflow-hidden glass-light dark:glass-dark" style="animation: slideUp .38s cubic-bezier(.16,1,.3,1) .05s both">
          <div class="text-xs font-semibold tracking-widest uppercase text-ink-400 dark:text-ink-500 mb-2">Entradas</div>
          <div class="flex items-center gap-1.5 mb-1">
            <div class="w-6 h-6 rounded-full bg-emerald-100 dark:bg-emerald-900/40 flex items-center justify-center">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5,12 12,5 19,12"/></svg>
            </div>
            <span class="text-brand-500 text-xs font-bold">Mês</span>
          </div>
          <div id="dash-in" class="text-xl font-semibold dark:text-white text-ink-900 tracking-tight">R$ 0</div>
        </div>
        <!-- despesas -->
        <div class="rounded-2xl p-4 relative overflow-hidden glass-light dark:glass-dark" style="animation: slideUp .38s cubic-bezier(.16,1,.3,1) .1s both">
          <div class="text-xs font-semibold tracking-widest uppercase text-ink-400 dark:text-ink-500 mb-2">Saídas</div>
          <div class="flex items-center gap-1.5 mb-1">
            <div class="w-6 h-6 rounded-full bg-red-100 dark:bg-red-900/40 flex items-center justify-center">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="5,12 12,19 19,12"/></svg>
            </div>
            <span class="text-red-400 text-xs font-bold">Mês</span>
          </div>
          <div id="dash-out" class="text-xl font-semibold dark:text-white text-ink-900 tracking-tight">R$ 0</div>
        </div>
      </div>

      <!-- transações -->
      <div class="glass-light dark:glass-dark rounded-3xl p-5" style="animation: slideUp .38s cubic-bezier(.16,1,.3,1) .15s both">
        <div class="flex items-center justify-between mb-4">
          <div class="text-xs font-semibold tracking-widest uppercase text-ink-400 dark:text-ink-500">Transações</div>
          <button onclick="clearAllTx()" class="text-xs text-ink-400 dark:text-ink-600 font-medium">Limpar</button>
        </div>
        <div id="tx-list" class="flex flex-col gap-2.5">
          <!-- populated by JS -->
        </div>
        <div id="tx-empty" class="text-center py-8 hidden">
          <div class="text-3xl mb-3">💸</div>
          <div class="text-sm text-ink-400 dark:text-ink-500 font-medium">Nenhuma transação ainda.</div>
          <div class="text-xs text-ink-300 dark:text-ink-700 mt-1">Toque em + para começar.</div>
        </div>
      </div>

    </div><!-- end scroll -->

    <!-- FAB -->
    <div class="absolute bottom-0 left-0 right-0 flex justify-center safe-bottom pb-8 pointer-events-none" style="animation: slideUp .5s cubic-bezier(.34,1.56,.64,1) .2s both">

<div id="screen-lanc" class="screen" style="z-index:85">

            const calcKeys = [7,8,9,4,5,6,1,2,3];
            calcKeys.forEach(k => {
              document.write(`<button class="npbtn text-ink-800 dark:text-ink-200 font-light hover:bg-ink-100 dark:hover:bg-ink-800/60" onclick="calcInput('${k}')">${k}</button>`);
            });
          </script>
          <button class="npbtn text-ink-500 dark:text-ink-400" onclick="calcInput('.')">
            <span class="text-2xl font-light">.</span>
          </button>
          <button class="npbtn text-ink-800 dark:text-ink-200 font-light" onclick="calcInput('0')">0</button>
          <button class="npbtn text-ink-500 dark:text-ink-400" onclick="calcDel()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>

<div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 z-[999] px-5 py-3 rounded-2xl text-sm font-semibold text-white shadow-2xl opacity-0 transition-all duration-300 pointer-events-none" style="background: rgba(15,23,42,.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,.1)"></div>

<!-- ============================================================
     JAVASCRIPT
============================================================ -->
<script>
'use strict';

// ── THEME ──
const html = document.documentElement;
let isDark = localStorage.getItem('fluxo_theme') !== 'light';
function applyTheme(){
  if(isDark){ html.classList.add('dark'); } else { html.classList.remove('dark'); }
}
function toggleTheme(){
  isDark = !isDark;
  localStorage.setItem('fluxo_theme', isDark ? 'dark' : 'light');
  applyTheme();
}
applyTheme();

// ── STORAGE KEYS ──
const K = {
  pin:   'fluxo_pin',
  name:  'fluxo_name',
  txs:   'fluxo_txs',
};

// ── HELPERS ──
const uid  = () => Date.now().toString(36) + Math.random().toString(36).slice(2,5);
const fv   = v  => 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
const fvs  = v  => 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits:0,  maximumFractionDigits:0});
const fd   = s  => new Date(s+'T12:00:00').toLocaleDateString('pt-BR', {day:'2-digit', month:'short'});
const nowBR = () => new Date(new Date().toLocaleString('en-US', {timeZone:'America/Sao_Paulo'}));
const mKey = d  => d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
const todayStr = () => { const d = nowBR(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };

function getTxs(){ return JSON.parse(localStorage.getItem(K.txs) || '[]'); }
function setTxs(t){ localStorage.setItem(K.txs, JSON.stringify(t)); }

function showToast(msg, dur=2200){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  t.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(t._to);
  t._to = setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(-8px)'; }, dur);
}

// ── SCREENS ──
const screens = ['splash','pin','dash','lanc'];
function showScreen(id){
  screens.forEach(s => {
    const el = document.getElementById('screen-'+s);
    el.classList.toggle('active', s === id);
  });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// SPLASH
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function initSplash(){
  const bar = document.getElementById('splash-bar');
  requestAnimationFrame(() => { bar.style.width = '100%'; });
  setTimeout(() => {
    const logo = document.getElementById('splash-logo');
    const wm   = document.getElementById('splash-wordmark');
    logo.style.animation = 'logoExit .6s cubic-bezier(.4,0,.2,1) forwards';
    wm.style.animation   = 'logoExit .45s cubic-bezier(.4,0,.2,1) .05s forwards';
    setTimeout(() => showScreen('pin'), 600);
  }, 1600);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// PIN
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let pinBuffer = '';
let pinMode   = '';  // 'create' | 'confirm' | 'enter'
let pinTemp   = '';
let pinName   = '';
let nameStep  = false;

function initPin(){
  const storedPin  = localStorage.getItem(K.pin);
  const storedName = localStorage.getItem(K.name);

  if(!storedName){
    // first time — ask name via PIN screen repurposed
    nameStep = true;
    pinMode  = 'name';
    document.getElementById('pin-title').textContent    = 'Qual seu nome?';
    document.getElementById('pin-subtitle').textContent = 'Personaliza sua experiência';
    renderNameInput();
    document.getElementById('pin-dots').style.visibility = 'hidden';
  } else if(!storedPin){
    pinMode = 'create';
    document.getElementById('pin-title').textContent    = 'Criar PIN';
    document.getElementById('pin-subtitle').textContent = 'Escolha 4 dígitos';
  } else {
    pinMode = 'enter';
    document.getElementById('pin-title').textContent    = 'PIN de Acesso';
    document.getElementById('pin-subtitle').textContent = 'Digite seus 4 dígitos';
    document.getElementById('pin-reset-btn').classList.remove('hidden');
  }
}

function renderNameInput(){
  const dotsEl = document.getElementById('pin-dots');
  dotsEl.innerHTML = `
    <div class="flex flex-col items-center gap-3 w-full">
      <input id="name-input" type="text" placeholder="Seu nome" maxlength="18"
        class="text-center text-xl font-light bg-transparent dark:text-white text-ink-900 outline-none placeholder-ink-300 dark:placeholder-ink-700 border-b border-ink-200 dark:border-ink-700 pb-2 px-4 w-full"
        onkeydown="if(event.key==='Enter')submitName()"
        autofocus>
      <button onclick="submitName()" class="mt-2 px-6 py-2 rounded-xl text-sm font-semibold text-white" style="background: linear-gradient(135deg,#22c55e,#06b6d4)">Continuar</button>
    </div>`;
}

function submitName(){
  const val = (document.getElementById('name-input')?.value || '').trim();
  if(!val){ showToast('Digite seu nome 😊'); return; }
  pinName = val;
  localStorage.setItem(K.name, val);
  nameStep = false;
  pinMode  = 'create';
  document.getElementById('pin-dots').style.visibility = 'visible';
  document.getElementById('pin-dots').innerHTML = `
    <div class="pin-dot text-ink-300 dark:text-ink-600"></div>
    <div class="pin-dot text-ink-300 dark:text-ink-600"></div>
    <div class="pin-dot text-ink-300 dark:text-ink-600"></div>
    <div class="pin-dot text-ink-300 dark:text-ink-600"></div>`;
  document.getElementById('pin-title').textContent    = `Olá, ${pinName} 👋`;
  document.getElementById('pin-subtitle').textContent = 'Escolha seu PIN de 4 dígitos';
}

function pinInput(n){
  if(pinMode === 'name') return;
  if(pinBuffer.length >= 4) return;
  pinBuffer += n;
  updatePinDots();
  if(pinBuffer.length === 4) setTimeout(processPIN, 120);
}
function pinDel(){
  pinBuffer = pinBuffer.slice(0,-1);
  updatePinDots();
}
function updatePinDots(){
  const dots = document.querySelectorAll('.pin-dot');
  dots.forEach((d,i) => {
    if(i < pinBuffer.length){
      d.style.background = '#22c55e';
      d.style.borderColor = '#22c55e';
      d.style.transform = 'scale(1.15)';
      d.classList.add('filled');
    } else {
      d.style.background = '';
      d.style.borderColor = '';
      d.style.transform   = '';
      d.classList.remove('filled');
    }
  });
}
function processPIN(){
  const stored = localStorage.getItem(K.pin);
  if(pinMode === 'create'){
    pinTemp = pinBuffer; pinBuffer = '';
    updatePinDots();
    pinMode = 'confirm';
    document.getElementById('pin-title').textContent    = 'Confirmar PIN';
    document.getElementById('pin-subtitle').textContent = 'Digite novamente';
  } else if(pinMode === 'confirm'){
    if(pinBuffer === pinTemp){
      localStorage.setItem(K.pin, pinBuffer);
      pinBuffer = ''; pinBuffer = ''; updatePinDots();
      pinMode = 'enter';
      showToast('PIN criado com sucesso ✓');
      enterDash();
    } else {
      shakePinDots();
      document.getElementById('pin-error').textContent = 'PINs diferentes. Tente novamente.';
      document.getElementById('pin-error').style.opacity = '1';
      pinBuffer = ''; pinTemp = ''; pinMode = 'create';
      document.getElementById('pin-title').textContent    = 'Criar PIN';
      document.getElementById('pin-subtitle').textContent = 'Escolha 4 dígitos';
      updatePinDots();
      setTimeout(()=>{ document.getElementById('pin-error').style.opacity='0'; },2000);
    }
  } else if(pinMode === 'enter'){
    if(pinBuffer === stored){
      pinBuffer = ''; updatePinDots();
      enterDash();
    } else {
      shakePinDots();
      document.getElementById('pin-error').textContent = 'PIN incorreto.';
      document.getElementById('pin-error').style.opacity = '1';
      pinBuffer = ''; updatePinDots();
      setTimeout(()=>{ document.getElementById('pin-error').style.opacity='0'; },2000);
    }
  }
}
function shakePinDots(){
  const el = document.getElementById('pin-dots');
  el.style.animation = 'pinShake .4s cubic-bezier(.36,.07,.19,.97)';
  setTimeout(()=>el.style.animation='',500);
}
function resetPin(){
  if(confirm('Redefinir PIN vai apagar TODOS os dados. Confirma?')){
    localStorage.clear();
    location.reload();
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// DASHBOARD
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function enterDash(){
  const name = localStorage.getItem(K.name) || '';
  document.getElementById('dash-user').textContent = name;
  renderDash();
  showScreen('dash');
}

function renderDash(){
  const txs  = getTxs();
  const now  = nowBR();
  const curM = mKey(now);

  const monthTxs = txs.filter(t => t.date?.startsWith(curM));
  const allTxs   = txs;

  // saldo total (all time)
  const totalIn  = allTxs.filter(t=>t.tipo==='entrada').reduce((s,t)=>s+t.val,0);
  const totalOut = allTxs.filter(t=>t.tipo==='saida').reduce((s,t)=>s+t.val,0);
  const saldo    = totalIn - totalOut;

  // mês
  const mIn  = monthTxs.filter(t=>t.tipo==='entrada').reduce((s,t)=>s+t.val,0);
  const mOut = monthTxs.filter(t=>t.tipo==='saida').reduce((s,t)=>s+t.val,0);

  // saldo card
  document.getElementById('dash-saldo').textContent = fv(Math.abs(saldo));
  document.getElementById('dash-saldo').style.color  = '';

  // badge
  const badge    = document.getElementById('dash-saldo-badge');
  const badgeTxt = document.getElementById('dash-badge-txt');
  const glow     = document.getElementById('hero-glow');
  if(allTxs.length > 0){
    badge.style.opacity = '1';
    if(saldo >= 0){
      badge.style.background = 'rgba(34,197,94,.12)';
      badge.style.color       = '#22c55e';
      badge.style.borderColor = 'rgba(34,197,94,.25)';
      badgeTxt.textContent    = saldo === 0 ? 'Zerado' : '▲ Positivo';
      glow.style.opacity      = '1';
      glow.style.background   = 'radial-gradient(ellipse 70% 60% at 30% 40%, rgba(34,197,94,.18) 0%, transparent 65%)';
    } else {
      badge.style.background = 'rgba(248,113,113,.12)';
      badge.style.color       = '#f87171';
      badge.style.borderColor = 'rgba(248,113,113,.25)';
      badgeTxt.textContent    = '▼ Negativo';
      glow.style.opacity      = '1';
      glow.style.background   = 'radial-gradient(ellipse 70% 60% at 30% 40%, rgba(248,113,113,.15) 0%, transparent 65%)';
    }
    badge.style.border = '1px solid';
  } else {
    badge.style.opacity = '0';
    glow.style.opacity  = '0';
  }

  // mês cards
  document.getElementById('dash-in').textContent  = fvs(mIn);
  document.getElementById('dash-out').textContent = fvs(mOut);

  // tx list
  const listEl  = document.getElementById('tx-list');
  const emptyEl = document.getElementById('tx-empty');
  const recent  = [...txs].reverse().slice(0,30);

  if(!recent.length){
    listEl.innerHTML = '';
    emptyEl.classList.remove('hidden');
    return;
  }
  emptyEl.classList.add('hidden');

  listEl.innerHTML = recent.map(t => `
    <div class="tx-item flex items-center gap-3 rounded-2xl px-4 py-3.5 group cursor-pointer"
      style="background:${t.tipo==='entrada'?'rgba(34,197,94,.06)':'rgba(248,113,113,.06)'}; border: 1px solid ${t.tipo==='entrada'?'rgba(34,197,94,.1)':'rgba(248,113,113,.1)'}">
      <div class="w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0"
        style="background:${t.tipo==='entrada'?'rgba(34,197,94,.12)':'rgba(248,113,113,.12)'}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${t.tipo==='entrada'?'#22c55e':'#f87171'}" stroke-width="2.5" stroke-linecap="round">
          ${t.tipo==='entrada'
            ? '<line x1="12" y1="19" x2="12" y2="5"/><polyline points="5,12 12,5 19,12"/>'
            : '<line x1="12" y1="5" x2="12" y2="19"/><polyline points="5,12 12,19 19,12"/>'}
        </svg>
      </div>
      <div class="flex-1 min-w-0">
        <div class="text-sm font-semibold dark:text-white text-ink-800 truncate">${t.desc || (t.tipo==='entrada'?'Entrada':'Saída')}</div>
        <div class="text-xs text-ink-400 dark:text-ink-500 font-medium mt-0.5">${fd(t.date)}</div>
      </div>
      <div class="flex items-center gap-2 flex-shrink-0">
        <div class="text-sm font-bold ${t.tipo==='entrada'?'text-emerald-500':'text-red-400'}">${t.tipo==='entrada'?'+':'-'}${fv(t.val)}</div>
        <button onclick="deleteTx('${t.id}')" class="opacity-0 group-hover:opacity-100 w-6 h-6 rounded-full flex items-center justify-center hover:bg-red-100 dark:hover:bg-red-900/30 transition-all duration-150">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>
  `).join('');
}

function deleteTx(id){
  const txs = getTxs().filter(t => t.id !== id);
  setTxs(txs);
  renderDash();
  showToast('Transação removida');
}

function clearAllTx(){
  if(confirm('Apagar todas as transações?')){
    setTxs([]);
    renderDash();
    showToast('Tudo limpo.');
  }
}

function lockApp(){
  pinBuffer = ''; updatePinDots();
  pinMode   = 'enter';
  document.getElementById('pin-title').textContent    = 'PIN de Acesso';
  document.getElementById('pin-subtitle').textContent = 'Digite seus 4 dígitos';
  document.getElementById('pin-reset-btn').classList.remove('hidden');
  showScreen('pin');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// LANÇAMENTO
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let calcBuf = '';
let tipoSel = 'entrada';

function openLancamento(){
  calcBuf = ''; tipoSel = 'entrada';
  updateCalcDisplay();
  setTipo('entrada');
  document.getElementById('lanc-desc').value = '';
  showScreen('lanc');
}
function closeLancamento(){
  showScreen('dash');
}

function calcInput(k){
  if(k === '.' && calcBuf.includes('.')) return;
  if(calcBuf === '0' && k !== '.') { calcBuf = k; }
  else { calcBuf += k; }
  // max 12 chars
  if(calcBuf.length > 12) calcBuf = calcBuf.slice(0,12);
  updateCalcDisplay();
}
function calcDel(){
  calcBuf = calcBuf.slice(0,-1);
  updateCalcDisplay();
}
function updateCalcDisplay(){
  const el = document.getElementById('calc-display');
  const raw = parseFloat(calcBuf) || 0;
  el.textContent = calcBuf === '' ? 'R$ 0' : 'R$ ' + (calcBuf.endsWith('.')?calcBuf.replace('.',','): raw.toLocaleString('pt-BR',{minimumFractionDigits: calcBuf.includes('.')?calcBuf.split('.')[1].length:0}));
}

function setTipo(t){
  tipoSel = t;
  const ci = document.getElementById('chip-in');
  const co = document.getElementById('chip-out');
  const btn = document.getElementById('btn-confirmar');
  if(t === 'entrada'){
    ci.style.background = 'rgba(34,197,94,.15)';
    ci.style.border     = '1px solid rgba(34,197,94,.25)';
    ci.style.color      = '#22c55e';
    co.style.background = '';
    co.style.border     = '';
    co.style.color      = '';
    btn.style.background = 'linear-gradient(135deg, #22c55e, #06b6d4)';
    btn.style.boxShadow  = '0 8px 24px rgba(34,197,94,.4)';
  } else {
    co.style.background = 'rgba(248,113,113,.12)';
    co.style.border     = '1px solid rgba(248,113,113,.22)';
    co.style.color      = '#f87171';
    ci.style.background = '';
    ci.style.border     = '';
    ci.style.color      = '';
    btn.style.background = 'linear-gradient(135deg, #f87171, #ef4444)';
    btn.style.boxShadow  = '0 8px 24px rgba(248,113,113,.4)';
  }
}

function confirmarLanc(){
  const val = parseFloat(calcBuf);
  if(!val || val <= 0){ showToast('Digite um valor válido'); return; }
  const desc = document.getElementById('lanc-desc').value.trim();
  const tx = { id: uid(), tipo: tipoSel, val, desc, date: todayStr(), createdAt: Date.now() };
  const txs = getTxs();
  txs.push(tx);
  setTxs(txs);
  showToast(tipoSel === 'entrada' ? `+${fv(val)} registrado ✓` : `-${fv(val)} registrado ✓`);
  closeLancamento();
  renderDash();
}

window.addEventListener('DOMContentLoaded', () => {
  initSplash();
  // pin init after splash
  setTimeout(() => initPin(), 1700);
});
</script>
